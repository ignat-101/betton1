services:
  - type: web
    name: ton-flashbet
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd .. && npm install && npm run build && cp -r dist backend/dist
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20.0.0"
      - key: ADMIN_WALLET
        value: "UQCfdyrb0Fj8lA32OfizTwGY829tTzihsEYl1FrpBzeVKdi0"
    plan: free
